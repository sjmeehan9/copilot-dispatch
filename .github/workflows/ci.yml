name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Test · Evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r infra/requirements.txt

      - name: Black formatting check
        run: black --check app/src/ tests/ scripts/

      - name: isort import ordering check
        run: isort --check-only app/src/ tests/ scripts/

      - name: Run tests with coverage
        run: pytest -q --cov=app/src --cov-report=term-missing

      - name: Run quality gate evals
        run: python scripts/evals.py
